name: Release Plugin

on:
  release:
    types: [created]

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Plugin
      uses: actions/checkout@v7
      with:
        path: plugin

    - name: Checkout WebODM
      uses: actions/checkout@v7
      with:
        repository: OpenDroneMap/WebODM
        path: WebODM

    - name: Use Node.js
      uses: actions/setup-node@v6

    - name: Run Tests
      run: |
        cd plugin
        node test-exif.js

    - name: Install dependencies and build
      run: |
        cd WebODM
        npm install
        cd ../plugin/public
        npm install
        npm run build

    - name: Extract Version
      id: extract_version
      run: |
        cd plugin
        VERSION=$(node -p "require('./manifest.json').version")
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Package plugin
      run: |
        cd plugin
        mkdir -p package/webodm-altitude-filter-plugin
        cp -r public plugin.py __init__.py manifest.json LICENSE README.md package/webodm-altitude-filter-plugin/
        rm -rf package/webodm-altitude-filter-plugin/public/node_modules
        cd package
        zip -r ../webodm-altitude-filter-${{ steps.extract_version.outputs.version }}.zip webodm-altitude-filter-plugin

    - name: Upload Release Asset
      uses: softprops/action-gh-release@v1
      with:
        files: plugin/webodm-altitude-filter-${{ steps.extract_version.outputs.version }}.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
